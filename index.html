<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS IA - Premium Coctelería</title>
    <style>
        /* --- DISEÑO PREMIUM --- */
        body {
            background: radial-gradient(circle at top, #1a1a1a, #050505);
            color: #e0e0e0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        h1 {
            font-size: 2.8rem;
            letter-spacing: 8px;
            background: linear-gradient(to right, #ffcc00, #ff8800);
            /* Estas líneas son correctas, ignora si el editor las marca en rojo */
            -webkit-background-clip: text;
            background-clip: text; 
            -webkit-text-fill-color: transparent;
            margin: 0;
            font-weight: 900;
            filter: drop-shadow(0 0 15px rgba(255, 204, 0, 0.2));
        }

        #estado {
            color: #00ffcc;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 3px;
            margin-top: 10px;
            font-weight: bold;
        }

        /* --- CONTENEDOR DE CRISTAL --- */
        #receta {
            width: 90%;
            max-width: 480px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 35px;
            padding: 35px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            transition: all 0.4s ease;
            text-align: center;
        }

        .escuchando {
            border-color: #00ffcc !important;
            box-shadow: 0 0 40px rgba(0, 255, 204, 0.15) !important;
            transform: scale(1.01);
        }

        #foto {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 20px;
            margin: 15px 0;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: none;
        }

        .titulo-bebida {
            font-size: 2rem;
            color: #fff;
            margin: 15px 0;
            font-weight: 700;
        }

        .info-pill {
            display: inline-block;
            background: rgba(255, 204, 0, 0.15);
            color: #ffcc00;
            padding: 6px 18px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: bold;
            border: 1px solid rgba(255, 204, 0, 0.3);
            margin-bottom: 10px;
        }

        .seccion {
            text-align: left;
            margin-top: 18px;
        }

        .label {
            color: #666;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            display: block;
            margin-bottom: 6px;
        }

        .contenido {
            font-size: 0.95rem;
            line-height: 1.5;
            color: #ccc;
        }

        .decoracion-box {
            margin-top: 25px;
            padding: 15px;
            background: linear-gradient(90deg, rgba(0,255,204,0.08), transparent);
            border-radius: 15px;
            border-left: 3px solid #00ffcc;
            text-align: left;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: #00ffcc;
            border-radius: 50%;
            display: inline-block;
            margin-left: 5px;
            animation: blink 1s infinite alternate;
        }

        @keyframes blink { from { opacity: 0.2; } to { opacity: 1; } }
    </style>
    
    <link rel="manifest" href="manifest.json">

    //VINCULAION PARA LA App
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('Jarvis App lista'))
      .catch(err => console.log('Error al registrar App', err));
  }
</script>

</head>
<body>

    <div class="header">
        <h1>JARVIS PURO MAR</h1>
        <div id="estado">SISTEMA ONLINE <div class="dot"></div></div>
    </div>

    <div id="receta">
        <div id="inicial">
            <p style="color: #555; font-size: 0.9rem; letter-spacing: 1px;">ESPERANDO COMANDO DE VOZ...</p>
            <p style="color: #333; font-size: 0.7rem;">DI "JARVIS" PARA COMENZAR</p>
        </div>

        <div id="dinamico" style="display: none;">
            <div class="info-pill">RECETA LOCALIZADA</div>
            <img id="foto" src="" alt="Bebida">
            <div id="info-texto"></div>
        </div>
    </div>

    <script>
        const receta = document.getElementById("receta");
        const dinamico = document.getElementById("dinamico");
        const inicial = document.getElementById("inicial");
        const foto = document.getElementById("foto");
        const infoTexto = document.getElementById("info-texto");

        let activo = false;
        let voces = [];

        window.speechSynthesis.onvoiceschanged = () => {
            voces = window.speechSynthesis.getVoices();
        };

        function hablar(texto) {
            const mensaje = new SpeechSynthesisUtterance(texto);
            // Intentamos buscar una voz en español que suene bien
            let voz = voces.find(v => v.lang.includes("es-ES") || v.name.includes("David"));
            if (voz) mensaje.voice = voz;
            mensaje.pitch = 0.85;
            mensaje.rate = 0.95;
            window.speechSynthesis.speak(mensaje);
        }

        async function consultarServidor(texto) {
            // Asegúrate de que estos nombres coincidan con tu database.json
            const misRecetas = ["jarra de limonada", "mojito", "margarita", "pisco"]; 
            const coincidencia = misRecetas.find(r => texto.includes(r));

            if (coincidencia) {
                try {
                    const respuesta = await fetch(`https://jarvis-backend-2-o8od.onrender.com/receta?nombre=${encodeURIComponent(coincidencia)}`);
                    const info = await respuesta.json();

                    inicial.style.display = "none";
                    dinamico.style.display = "block";
                    foto.src = info.imagen;
                    foto.style.display = "block";

                    infoTexto.innerHTML = `
                        <div class="titulo-bebida">${info.titulo}</div>
                        <div class="seccion">
                            <span class="label">Ingredientes</span>
                            <p class="contenido">${info.ingredientes}</p>
                        </div>
                        <div class="seccion">
                            <span class="label">Preparación</span>
                            <p class="contenido">${info.preparacion}</p>
                        </div>
                        <div class="decoracion-box">
                            <span class="label" style="color:#00ffcc">Toque Final / Decoración</span>
                            <p class="contenido" style="font-style:italic; color:#fff;">${info.decoracion}</p>
                        </div>
                    `;

                    receta.classList.remove('escuchando');
                    hablar(info.voz);
                    activo = false; // Desactivamos tras encontrar la receta
                } catch (e) {
                    hablar("Error de conexión con el servidor.");
                }
            }
        }

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const rec = new SpeechRecognition();
            rec.lang = "es-ES";
            rec.continuous = true;

            rec.onresult = (e) => {
                const texto = e.results[e.results.length - 1][0].transcript.toLowerCase();
                
                if (texto.includes("jarvis")) {
                    activo = true;
                    receta.classList.add('escuchando');
                    hablar("En que te ayudao?");
                    return;
                }

                if (activo) {
                    consultarServidor(texto);
                }
            };

            rec.onend = () => rec.start();
            rec.start();
        }
    </script>
</body>
</html>
