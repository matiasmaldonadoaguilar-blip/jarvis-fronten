<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS IA - Premium Coctelería</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        /* --- MANTENEMOS TU DISEÑO PREMIUM EXACTO --- */
        body {
            background: radial-gradient(circle at top, #1a1a1a, #050505);
            color: #e0e0e0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .header { text-align: center; margin-bottom: 25px; }

        h1 {
            font-size: 2.8rem;
            letter-spacing: 8px;
            background: linear-gradient(to right, #ffcc00, #ff8800);
            -webkit-background-clip: text;
            background-clip: text; 
            -webkit-text-fill-color: transparent;
            margin: 0;
            font-weight: 900;
            filter: drop-shadow(0 0 15px rgba(255, 204, 0, 0.2));
        }

        #estado {
            color: #00ffcc;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 3px;
            margin-top: 10px;
            font-weight: bold;
        }

        #receta {
            width: 90%;
            max-width: 480px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 35px;
            padding: 35px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            transition: all 0.4s ease;
            text-align: center;
        }

        .escuchando {
            border-color: #00ffcc !important;
            box-shadow: 0 0 40px rgba(0, 255, 204, 0.15) !important;
            transform: scale(1.01);
        }

        #foto {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 20px;
            margin: 15px 0;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: none;
        }

        .titulo-bebida {
            font-size: 2rem;
            color: #fff;
            margin: 15px 0;
            font-weight: 700;
        }

        .info-pill {
            display: inline-block;
            background: rgba(255, 204, 0, 0.15);
            color: #ffcc00;
            padding: 6px 18px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: bold;
            border: 1px solid rgba(255, 204, 0, 0.3);
            margin-bottom: 10px;
        }

        .seccion { text-align: left; margin-top: 18px; }

        .label {
            color: #666;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            display: block;
            margin-bottom: 6px;
        }

        .contenido { font-size: 0.95rem; line-height: 1.5; color: #ccc; }

        .decoracion-box {
            margin-top: 25px;
            padding: 15px;
            background: linear-gradient(90deg, rgba(0,255,204,0.08), transparent);
            border-radius: 15px;
            border-left: 3px solid #00ffcc;
            text-align: left;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: #00ffcc;
            border-radius: 50%;
            display: inline-block;
            margin-left: 5px;
            animation: blink 1s infinite alternate;
        }

        @keyframes blink { from { opacity: 0.2; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="header">
        <h1>JARVIS PURO MAR</h1>
        <div id="estado">SISTEMA ONLINE <div class="dot"></div></div>
    </div>

    <div id="receta">
        <div id="inicial">
            <p style="color: #555; font-size: 0.9rem; letter-spacing: 1px;">ESPERANDO COMANDO DE VOZ...</p>
            <p style="color: #333; font-size: 0.7rem;">DI "JARVIS" PARA COMENZAR</p>
        </div>

        <div id="dinamico" style="display: none;">
            <div class="info-pill">RECETA LOCALIZADA</div>
            <img id="foto" src="" alt="Bebida">
            <div id="info-texto"></div>
        </div>
    </div>

    <script>
        // --- CONFIGURACIÓN SUPABASE ---
        const URL_SUPABASE = 'https://bpmxnvvjuxumdateudfi.supabase.co';
        const KEY_SUPABASE = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJwbXhudnZqdXh1bWRhdGV1ZGZpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyODg0NzMsImV4cCI6MjA5MTg2NDQ3M30.lWDHvHHG1DvmSNHXRIkQiRy0AA6B7m-gdae12TRULIk'; // Pega tu clave de la captura aquí

        const _supabase = supabase.createClient(URL_SUPABASE, KEY_SUPABASE);

        const recetaContenedor = document.getElementById("receta");
        const dinamico = document.getElementById("dinamico");
        const inicial = document.getElementById("inicial");
        const foto = document.getElementById("foto");
        const infoTexto = document.getElementById("info-texto");

        let activo = false;
        let voces = [];

        window.speechSynthesis.onvoiceschanged = () => {
            voces = window.speechSynthesis.getVoices();
        };

        function hablar(texto) {
            window.speechSynthesis.cancel(); // Detener cualquier voz previa
            const mensaje = new SpeechSynthesisUtterance(texto);
            let voz = voces.find(v => v.lang.includes("es-ES") || v.name.includes("David"));
            if (voz) mensaje.voice = voz;
            mensaje.pitch = 0.85;
            mensaje.rate = 0.95;
            window.speechSynthesis.speak(mensaje);
        }

        async function consultarSupabase(textoEscuchado) {
            // 1. Obtenemos todos los cócteles de Supabase
            const { data: todosLosCocteles, error } = await _supabase
                .from('cocteles')
                .select('*');

            if (error) {
                console.error("Error:", error);
                return;
            }

            // 2. Buscamos coincidencia
            const info = todosLosCocteles.find(r => 
                textoEscuchado.toLowerCase().includes(r.nombre.toLowerCase())
            );

            if (info) {
                inicial.style.display = "none";
                dinamico.style.display = "block";
                foto.src = info.imagen;
                foto.style.display = "block";

                infoTexto.innerHTML = `
                    <div class="titulo-bebida">${info.nombre}</div>
                    <div class="seccion">
                        <span class="label">Ingredientes</span>
                        <p class="contenido">${info.ingredientes}</p>
                    </div>
                    <div class="seccion">
                        <span class="label">Preparación</span>
                        <p class="contenido">${info.preparacion}</p>
                    </div>
                    <div class="decoracion-box">
                        <span class="label" style="color:#00ffcc">Toque Final / Decoración</span>
                        <p class="contenido" style="font-style:italic; color:#fff;">${info.decoracion || 'Sin decoración específica'}</p>
                    </div>
                `;

                recetaContenedor.classList.remove('escuchando');
                hablar("Excelente elección. Aquí tienes la receta para un " + info.nombre);
                activo = false; 
            }
        }

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const rec = new SpeechRecognition();
            rec.lang = "es-ES";
            rec.continuous = true;

            rec.onresult = (e) => {
                const texto = e.results[e.results.length - 1][0].transcript.toLowerCase();
                console.log("Escuchado:", texto);
                
                if (texto.includes("jarvis")) {
                    activo = true;
                    recetaContenedor.classList.add('escuchando');
                    hablar("¿En qué te ayudo?");
                    return;
                }

                if (activo) {
                    consultarSupabase(texto);
                }
            };

            rec.onend = () => rec.start();
            rec.start();
        }
    </script>
</body>
</html>
