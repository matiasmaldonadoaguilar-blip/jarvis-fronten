<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS - Final Stable Version</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --gold: #ffcc00;
            --gold-glow: rgba(255, 204, 0, 0.4);
            --cyan: #00ffcc;
            --cyan-glow: rgba(0, 255, 204, 0.3);
        }

        body {
            background: radial-gradient(circle at center, #111, #000);
            color: #e0e0e0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        .header { text-align: center; margin-bottom: 20px; width: 100%; }
        h1 {
            font-size: clamp(1.8rem, 8vw, 3.2rem);
            letter-spacing: clamp(4px, 2vw, 10px);
            color: var(--gold);
            text-shadow: 0 0 15px var(--gold-glow);
            margin: 0;
            text-transform: uppercase;
        }

        #status {
            color: var(--cyan);
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 3px;
            margin-top: 10px;
        }

        #receta {
            width: 100%;
            max-width: 1100px;
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: clamp(15px, 5vw, 40px);
            box-sizing: border-box;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            transition: all 0.4s ease;
        }

        .grid-receta {
            display: flex;
            flex-direction: column;
            gap: 25px;
            align-items: center;
        }

        @media (min-width: 850px) {
            .grid-receta { flex-direction: row; align-items: flex-start; text-align: left; }
            #foto { width: 45%; }
            #info-texto { width: 55%; }
        }

        #foto {
            width: 100%;
            max-height: 450px;
            object-fit: cover;
            border-radius: 20px;
            border: 1px solid var(--gold);
            display: none;
        }

        .titulo-bebida { font-size: clamp(2rem, 6vw, 3rem); color: #fff; margin: 0 0 15px 0; }
        .label { color: var(--gold); font-size: 0.8rem; text-transform: uppercase; font-weight: bold; display: block; margin-bottom: 8px; }
        .contenido { font-size: clamp(1.1rem, 4vw, 1.5rem); line-height: 1.4; color: #ddd; margin-bottom: 25px; }

        .escuchando-celeste { border-color: var(--cyan) !important; box-shadow: 0 0 40px var(--cyan-glow) !important; }
        .hablando-dorado { border-color: var(--gold) !important; box-shadow: 0 0 40px var(--gold-glow) !important; }
    </style>
</head>
<body onclick="despertarSistema()">

    <div class="header">
        <h1>SISTEMA NEXUS</h1>
        <div id="status">SISTEMA ONLINE</div>
    </div>

    <div id="receta">
        <div id="inicial" style="text-align: center; padding: 40px 0;">
            <p style="color: #666;">PULSA LA PANTALLA PARA ACTIVAR</p>
            <p style="color: var(--gold); font-weight: bold;">DI "LEO" PARA COMENZAR</p>
        </div>

        <div id="dinamico" style="display: none;">
            <div class="grid-receta">
                <img id="foto" src="" alt="Bebida">
                <div id="info-texto">
                    <h2 id="nombre-bebida" class="titulo-bebida"></h2>
                    <div>
                        <span class="label">Ingredientes</span>
                        <p id="txt-ingredientes" class="contenido" style="color: var(--gold);"></p>
                    </div>
                    <div id="sec-preparacion" style="opacity: 0.2; transition: opacity 0.5s;">
                        <span class="label">Preparación</span>
                        <p id="txt-preparacion" class="contenido"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const URL_SUPABASE = 'https://bpmxnvvjuxumdateudfi.supabase.co';
        const KEY_SUPABASE = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJwbXhudnZqdXh1bWRhdGV1ZGZpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyODg0NzMsImV4cCI6MjA5MTg2NDQ3M30.lWDHvHHG1DvmSNHXRIkQiRy0AA6B7m-gdae12TRULIk';
        const _supabase = supabase.createClient(URL_SUPABASE, KEY_SUPABASE);

        let rec;
        let voces = [];
        let estadoInteraccion = "esperando";
        let datosActuales = null;
        let microfonoActivo = false;
        let inicializado = false;
        let wakeLock = null;

        // Función para calcular similitud de texto (Levenshtein simplificado)
        function calcularSimilitud(s1, s2) {
            let mayor = Math.max(s1.length, s2.length);
            if (mayor === 0) return 1.0;
            let editos = 0; 
            let mini = Math.min(s1.length, s2.length);
            for(let i=0; i<mini; i++) { if(s1[i] !== s2[i]) editos++; }
            editos += Math.abs(s1.length - s2.length);
            return (mayor - editos) / mayor;
        }

        const requestWakeLock = async () => {
            try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } 
            catch (err) { console.log("WakeLock error:", err.message); }
        };

        function cargarVoces() { voces = window.speechSynthesis.getVoices(); }
        window.speechSynthesis.onvoiceschanged = cargarVoces;
        cargarVoces();

        function despertarSistema() {
            cargarVoces();
            requestWakeLock();
            if (!inicializado) {
                inicializado = true;
                hablar("Nexus activado. Di Leo.");
            }
        }

        function hablar(texto, callback) {
            window.speechSynthesis.cancel();
            microfonoActivo = false;
            if (rec) try { rec.stop(); } catch(e) {}

            document.getElementById("receta").classList.remove('escuchando-celeste');
            document.getElementById("receta").classList.add('hablando-dorado');

            const mensaje = new SpeechSynthesisUtterance(texto);
            let mejorVoz = voces.find(v => v.lang.includes("es") && (v.name.includes("male") || v.name.includes("Google"))) || voces.find(v => v.lang.includes("es"));
            
            if (mejorVoz) mensaje.voice = mejorVoz;
            mensaje.rate = 1.10; 
            mensaje.pitch = 0.75; 

            mensaje.onend = () => {
                document.getElementById("receta").classList.remove('hablando-dorado');
                microfonoActivo = true;
                setTimeout(() => {
                    if (estadoInteraccion !== "esperando") document.getElementById("receta").classList.add('escuchando-celeste');
                    if (rec && microfonoActivo) try { rec.start(); } catch(e) {}
                }, 500);
                if (callback) callback();
            };
            window.speechSynthesis.speak(mensaje);
        }

        function mostrarCoctel(coctel) {
            datosActuales = coctel;
            document.getElementById("inicial").style.display = "none";
            document.getElementById("dinamico").style.display = "block";
            document.getElementById("nombre-bebida").innerText = coctel.nombre;
            document.getElementById("txt-ingredientes").innerText = coctel.ingredientes;
            document.getElementById("txt-preparacion").innerText = coctel.preparacion;
            document.getElementById("foto").src = coctel.imagen;
            document.getElementById("foto").style.display = "block";
            document.getElementById("sec-preparacion").style.opacity = "0.2";
            
            estadoInteraccion = "preguntando_pasos";
            hablar(`${coctel.nombre}. Sus ingredientes son: ${coctel.ingredientes}. ¿Quieres saber cómo se prepara?`);
        }

        async function buscarCoctel(nombreEscuchado) {
            const { data: cocteles } = await _supabase.from('cocteles').select('*');
            
            // 1. Intento búsqueda exacta
            let coctel = cocteles.find(r => nombreEscuchado.includes(r.nombre.toLowerCase()));

            if (coctel) {
                mostrarCoctel(coctel);
            } else {
                // 2. Si no hay coincidencia exacta, buscar el más parecido
                let mejorMatch = null;
                let puntajeMaximo = 0;

                cocteles.forEach(c => {
                    let puntaje = calcularSimilitud(nombreEscuchado, c.nombre.toLowerCase());
                    if (puntaje > puntajeMaximo && puntaje > 0.4) {
                        puntajeMaximo = puntaje;
                        mejorMatch = c;
                    }
                });

                if (mejorMatch) {
                    datosActuales = mejorMatch;
                    estadoInteraccion = "confirmando_parecido";
                    hablar(`¿te refieres al cóctel ${mejorMatch.nombre}?`);
                } else {
                    hablar("No encontré ese cóctel en la base de datos del restaurante.");
                }
            }
        }

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            rec = new SpeechRecognition();
            rec.lang = "es-ES";
            rec.continuous = true;

            rec.onresult = (e) => {
                const texto = e.results[e.results.length - 1][0].transcript.toLowerCase();

                if (texto.includes("cerrar sistema") || texto.includes("finalizar") || texto.includes("descansar") || texto.includes("apagar")) {
                    hablar("Nexus fuera. Sistemas en reposo.", () => {
                        estadoInteraccion = "esperando";
                        datosActuales = null;
                        document.getElementById("dinamico").style.display = "none";
                        document.getElementById("inicial").style.display = "block";
                        document.getElementById("foto").src = "";
                        document.getElementById("receta").classList.remove('hablando-dorado', 'escuchando-celeste');
                    });
                    return;
                }

                if (texto.includes("repite") && datosActuales) {
                    if (texto.includes("ingredientes")) hablar(`Los ingredientes son: ${datosActuales.ingredientes}`);
                    else hablar(`La preparación es: ${datosActuales.preparacion}`);
                    return;
                }

                if (texto.includes("leo")) {
                    estadoInteraccion = "buscando";
                    hablar("Te escucho.");
                } else if (estadoInteraccion === "buscando") {
                    buscarCoctel(texto);
                } else if (estadoInteraccion === "confirmando_parecido") {
                    if (texto.includes("sí") || texto.includes("dale") || texto.includes("claro") || texto.includes("eso es")) {
                        mostrarCoctel(datosActuales);
                    } else {
                        estadoInteraccion = "buscando";
                        hablar("Entendido. ¿Qué cóctel preparas entonces?");
                    }
                } else if (estadoInteraccion === "preguntando_pasos") {
                    if (texto.includes("sí") || texto.includes("dale") || texto.includes("claro")) {
                        document.getElementById("sec-preparacion").style.opacity = "1";
                        hablar(`Pasos: ${datosActuales.preparacion}`);
                        estadoInteraccion = "finalizado";
                    } else if (texto.includes("no")) {
                        hablar("Entendido. Nexus listo.");
                        estadoInteraccion = "finalizado";
                    }
                }
            };

            rec.onend = () => { if (microfonoActivo) try { rec.start(); } catch(e) {} };
            rec.onerror = () => { setTimeout(() => { if (microfonoActivo) try { rec.start(); } catch(e) {} }, 500); };
            rec.start();
        }
    </script>
</body>
</html>
