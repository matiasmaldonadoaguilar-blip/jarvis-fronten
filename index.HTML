<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS - Advanced Bar System</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --gold: #ffcc00;
            --gold-glow: rgba(255, 204, 0, 0.5);
            --cyan: #00ffcc;
            --cyan-glow: rgba(0, 255, 204, 0.4);
            --bg: #050505;
        }

        body {
            background: radial-gradient(circle at center, #111, #000);
            color: #e0e0e0;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        .header { text-align: center; margin-bottom: 30px; }

        h1 {
            font-size: clamp(2rem, 8vw, 3.5rem);
            letter-spacing: 12px;
            color: var(--gold);
            text-shadow: 0 0 20px var(--gold-glow);
            margin: 0;
            font-weight: 900;
            text-transform: uppercase;
        }

        #estado-sistema {
            color: var(--cyan);
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 4px;
            margin-top: 15px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .dot {
            width: 8px; height: 8px;
            background: var(--cyan);
            border-radius: 50%;
            animation: blink 1s infinite alternate;
        }

        @keyframes blink { from { opacity: 0.2; } to { opacity: 1; } }

        #receta {
            width: 90%;
            max-width: 1100px;
            background: rgba(20, 20, 20, 0.7);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-radius: 40px;
            padding: 50px;
            box-shadow: 0 30px 100px rgba(0,0,0,0.9);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .escuchando-celeste {
            border-color: var(--cyan) !important;
            box-shadow: 0 0 50px var(--cyan-glow) !important;
            transform: scale(1.01);
        }

        .hablando-dorado {
            border-color: var(--gold) !important;
            box-shadow: 0 0 60px var(--gold-glow) !important;
            transform: scale(1.02);
        }

        .grid-receta {
            display: grid;
            grid-template-columns: 1fr 1.3fr;
            gap: 50px;
            align-items: start;
        }

        #foto {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: 30px;
            border: 1px solid rgba(255, 204, 0, 0.2);
            display: none;
        }

        .titulo-bebida {
            font-size: clamp(2.5rem, 6vw, 4rem);
            color: #fff;
            margin: 0 0 25px 0;
            font-weight: 800;
        }

        .label {
            color: var(--gold);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            display: block;
            margin-bottom: 12px;
            font-weight: bold;
        }

        .contenido { 
            font-size: 1.6rem; 
            line-height: 1.4; 
            color: #e0e0e0;
            margin: 0;
        }

        #inicial p {
            color: #666;
            letter-spacing: 3px;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>SISTEMA NEXUS</h1>
        <div id="estado-sistema">SISTEMA ONLINE <div class="dot"></div></div>
    </div>

    <div id="receta">
        <div id="inicial" style="text-align: center; padding: 60px 0;">
            <p>ESPERANDO COMANDO DE VOZ...</p>
            <p style="color: var(--gold); font-weight: bold; font-size: 0.9rem;">DI "LEO" PARA COMENZAR</p>
        </div>

        <div id="dinamico" style="display: none;">
            <div class="grid-receta">
                <img id="foto" src="" alt="Bebida">
                <div id="info-texto">
                    <h2 id="nombre-bebida" class="titulo-bebida"></h2>
                    <div class="seccion">
                        <span class="label">Ingredientes</span>
                        <p id="txt-ingredientes" class="contenido" style="color: var(--gold);"></p>
                    </div>
                    <div id="sec-preparacion" class="seccion" style="opacity: 0.1; margin-top: 30px;">
                        <span class="label">Preparación</span>
                        <p id="txt-preparacion" class="contenido"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const URL_SUPABASE = 'https://bpmxnvvjuxumdateudfi.supabase.co';
        const KEY_SUPABASE = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJwbXhudnZqdXh1bWRhdGV1ZGZpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyODg0NzMsImV4cCI6MjA5MTg2NDQ3M30.lWDHvHHG1DvmSNHXRIkQiRy0AA6B7m-gdae12TRULIk'; 
        const _supabase = supabase.createClient(URL_SUPABASE, KEY_SUPABASE);

        const contenedor = document.getElementById("receta");
        let rec;
        let voces = [];
        let estadoInteraccion = "esperando"; 
        let datosActuales = null;

        window.speechSynthesis.onvoiceschanged = () => { voces = window.speechSynthesis.getVoices(); };

        function hablar(texto, callback) {
            window.speechSynthesis.cancel();
            if (rec) rec.stop();

            contenedor.classList.remove('escuchando-celeste');
            contenedor.classList.add('hablando-dorado');

            const mensaje = new SpeechSynthesisUtterance(texto);
            
            // Selección de voz mejorada para evitar acento extranjero
            let vocesEspanol = voces.filter(v => v.lang.includes("es"));
            let mejorVoz = vocesEspanol.find(v => v.name.includes("México") || v.name.includes("Google español")) || vocesEspanol[0];
            if (mejorVoz) mensaje.voice = mejorVoz;

            mensaje.rate = 1.0; 
            mensaje.pitch = 0.8; 

            mensaje.onend = () => { 
                contenedor.classList.remove('hablando-dorado');
                if (estadoInteraccion === "buscando" || estadoInteraccion === "preguntando_pasos") {
                    contenedor.classList.add('escuchando-celeste');
                }
                if (callback) callback();
                if (rec) rec.start(); 
            };
            window.speechSynthesis.speak(mensaje);
        }

        async function buscarCoctel(nombre) {
            const { data } = await _supabase.from('cocteles').select('*');
            const coctel = data.find(r => nombre.includes(r.nombre.toLowerCase()));

            if (coctel) {
                datosActuales = coctel;
                mostrarInterfaz(coctel);
                estadoInteraccion = "preguntando_pasos";
                hablar(`${coctel.nombre}. Ingredientes: ${coctel.ingredientes}. ¿Quieres la preparación?`);
            } else {
                hablar("No encontré ese cóctel.");
            }
        }

        function mostrarInterfaz(c) {
            document.getElementById("inicial").style.display = "none";
            document.getElementById("dinamico").style.display = "block";
            document.getElementById("nombre-bebida").innerText = c.nombre;
            document.getElementById("txt-ingredientes").innerText = c.ingredientes;
            document.getElementById("txt-preparacion").innerText = c.preparacion;
            document.getElementById("foto").src = c.imagen;
            document.getElementById("foto").style.display = "block";
            document.getElementById("sec-preparacion").style.opacity = "0.1";
        }

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            rec = new SpeechRecognition();
            rec.lang = "es-ES";
            rec.continuous = true;

            rec.onresult = (e) => {
                const texto = e.results[e.results.length - 1][0].transcript.toLowerCase();

                // CERRAR SISTEMA
                if (texto.includes("cerrar sistema") || texto.includes("apagar") || texto.includes("descansar")) {
                    hablar("Nexus fuera. Sistemas en espera.", () => {
                        estadoInteraccion = "esperando";
                        datosActuales = null;
                        document.getElementById("dinamico").style.display = "none";
                        document.getElementById("inicial").style.display = "block";
                        contenedor.classList.remove('hablando-dorado', 'escuchando-celeste');
                    });
                    return;
                }

                // REPETIR INGREDIENTES O PREPARACIÓN
                if (texto.includes("repite") || texto.includes("repetir")) {
                    if (datosActuales) {
                        if (texto.includes("ingredientes")) {
                            hablar(`Los ingredientes son: ${datosActuales.ingredientes}`);
                        } else if (texto.includes("preparación") || texto.includes("pasos")) {
                            hablar(`La preparación es: ${datosActuales.preparacion}`);
                        } else {
                            hablar(`Te repito todo. Lleva: ${datosActuales.ingredientes}. Preparación: ${datosActuales.preparacion}`);
                        }
                    }
                    return;
                }

                if (texto.includes("leo")) {
                    estadoInteraccion = "buscando";
                    hablar("dime, te escucho.");
                } 
                else if (estadoInteraccion === "buscando") {
                    buscarCoctel(texto);
                } 
                else if (estadoInteraccion === "preguntando_pasos") {
                    if (texto.includes("sí") || texto.includes("claro") || texto.includes("dale")) {
                        document.getElementById("sec-preparacion").style.opacity = "1";
                        estadoInteraccion = "finalizado";
                        hablar(`Pasos: ${datosActuales.preparacion}`);
                    } else if (texto.includes("no")) {
                        estadoInteraccion = "finalizado";
                        hablar("Entendido. Nexus listo.");
                    }
                }
            };
            rec.start();
        }
    </script>
</body>
</html>
